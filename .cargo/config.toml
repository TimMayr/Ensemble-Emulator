# Native builds (Linux example)
[target.x86_64-unknown-linux-gnu]
rustflags = [
    "-C", "target-cpu=native",
]

# Optional: macOS
[target.x86_64-apple-darwin]
rustflags = [
    "-C", "target-cpu=native",
]

# Optional: Windows
[target.x86_64-pc-windows-msvc]
rustflags = [
    "-C", "target-cpu=native",
]

# WASM build (no native CPU features)
[target.wasm32-unknown-unknown]
rustflags = []