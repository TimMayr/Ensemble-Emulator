name: tests.yml
on:
    pull_request:
        branches: [ main ]

jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            -   name: Checkout Code
                uses: actions/checkout@v4
                with:
                    ref: ${{github.head_ref }}
                    token: ${{ secrets.GITHUB_TOKEN}}

            -   uses: dtolnay/rust-toolchain@nightly

            -   name: Cache Cargo
                uses: Swatinem/rust-cache@v2

            -   name: Run tests
                run: cargo test --workspace --profile release --verbose
