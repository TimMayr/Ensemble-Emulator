name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: clippy, rustfmt

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build CLI
        run: cargo build --release -p monsoon-cli

      - name: Build Frontend
        run: cargo build --release -p monsoon-frontend

      - name: Prepare artifacts
        shell: bash
        run: |
          mkdir -p artifacts
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp target/release/cli.exe "artifacts/monsoon-cli-${{ matrix.target }}.exe"
            cp target/release/frontend.exe "artifacts/monsoon-frontend-${{ matrix.target }}.exe"
          else
            cp target/release/cli "artifacts/monsoon-cli-${{ matrix.target }}"
            cp target/release/frontend "artifacts/monsoon-frontend-${{ matrix.target }}"
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.target }}
          path: artifacts/

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          VERSION=$(grep -m1 '^version = ' Cargo.toml | sed 's/version = "\(.*\)"/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          files: artifacts/*
          generate_release_notes: true

  publish-crates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@nightly

      - name: Publish monsoon-core
        run: cargo publish -p monsoon-core --token ${{ secrets.CARGO_REGISTRY_TOKEN }} || echo "::warning::monsoon-core publish failed or already published"

      - name: Wait for crates.io index
        run: sleep 30

      - name: Publish monsoon-default-renderers
        run: cargo publish -p monsoon-default-renderers --token ${{ secrets.CARGO_REGISTRY_TOKEN }} || echo "::warning::monsoon-default-renderers publish failed or already published"

      - name: Wait for crates.io index
        run: sleep 30

      - name: Publish monsoon-cli
        run: cargo publish -p monsoon-cli --token ${{ secrets.CARGO_REGISTRY_TOKEN }} || echo "::warning::monsoon-cli publish failed or already published"

      - name: Wait for crates.io index
        run: sleep 30

      - name: Publish monsoon-frontend
        run: cargo publish -p monsoon-frontend --token ${{ secrets.CARGO_REGISTRY_TOKEN }} || echo "::warning::monsoon-frontend publish failed or already published"

  deploy-web:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@nightly
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-wasm-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-wasm-

      - name: Install trunk
        run: cargo install --locked trunk

      - name: Build frontend with trunk
        working-directory: frontend
        run: trunk build --release

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
