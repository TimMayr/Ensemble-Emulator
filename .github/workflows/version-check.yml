name: Version Check

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  check-version:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check version increment
        run: |
          PR_VERSION=$(grep -m1 '^version = ' Cargo.toml | sed 's/version = "\(.*\)"/\1/')
          MAIN_VERSION=$(git show origin/main:Cargo.toml | grep -m1 '^version = ' | sed 's/version = "\(.*\)"/\1/')

          echo "PR version: $PR_VERSION"
          echo "Main version: $MAIN_VERSION"

          if [ "$PR_VERSION" = "$MAIN_VERSION" ]; then
            echo "::error::Version has not been incremented. Please bump the version in Cargo.toml."
            exit 1
          fi

          HIGHER=$(echo -e "$PR_VERSION\n$MAIN_VERSION" | sort -V | tail -1)
          if [ "$HIGHER" != "$PR_VERSION" ]; then
            echo "::error::PR version ($PR_VERSION) is not greater than main version ($MAIN_VERSION)."
            exit 1
          fi

          echo "✅ Version check passed: $MAIN_VERSION -> $PR_VERSION"
